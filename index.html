<!DOCTYPE html>
<html lang="ar" dir="rtl"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1900">
    <title>مشغل </title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    
    <style>
    .plyr__control--overlaid {
    display: none !important;
}
        body.blocker-enabled :is(iframe[src*='ads'], iframe[src*='doubleclick'], .adsbygoogle, [id*='google_ads'], [id*='taboola-'], .taboolaHeight, .taboola-placeholder, #top-ad, [id*='google-one-tap-iframe'], #amp_floatingAdDiv, #ez-content-blocker-container) {
            display: none !important;
            width: 0 !important;
            height: 0 !important;
            visibility: hidden !important;
            min-height: 0 !important;
        }
    </style>

    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-panel: #151b2b;
            --bg-hover: #1e263c;
            --accent: #00d2ff;
            --accent-hover: #00a3cc;
            --text-main: #f0f4f8;
            --text-muted: #8b9eb0;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1300px;
            gap: 20px;
            /* إضافة نقطة ارتكاز الزووم */
            transform-origin: top center;
            transition: transform 0.3s ease;
        }

        .toggle-panel-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-bottom: -10px;
            z-index: 10;
        }
        
        .btn-toggle-panel {
            background: var(--bg-panel);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .btn-toggle-panel:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .controls-panel {
            background: var(--bg-panel);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-group { display: flex; flex-wrap: wrap; gap: 10px; flex: 1; }

        .controls-panel input, .controls-panel textarea {
            flex: 1; min-width: 140px; padding: 12px; border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.2);
            color: white; outline: none; transition: 0.3s; font-family: inherit;
        }

        .controls-panel textarea { resize: vertical; min-height: 100px; width: 100%; }

        .controls-panel input:focus, .controls-panel textarea:focus { 
            border-color: var(--accent); box-shadow: 0 0 8px rgba(0, 210, 255, 0.3); 
        }

        .action-btns { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; }

        .btn {
            padding: 12px 18px; border: none; border-radius: 8px; color: white;
            font-weight: bold; cursor: pointer; transition: all 0.3s ease;
            font-size: 14px; display: flex; align-items: center; gap: 6px;
        }

        .btn:active { transform: scale(0.96); }
        .btn-add { background: var(--accent); color: #000; }
        .btn-add:hover { background: var(--accent-hover); }
        .btn-upload { background: var(--success); color: #000;}
        .btn-upload:hover { background: #26b361; }
        .btn-export { background: var(--warning); color: #000;}
        .btn-export:hover { background: #e09200; }
        .btn-clear { background: var(--danger); }
        .btn-clear:hover { background: #e03e4d; }
        .btn-save { background: #2ed573; color: #000; }
        .btn-save:hover { background: #26b361; }
        
        .btn-link { background: #3498db; color: #fff; }
        .btn-link:hover { background: #2980b9; }
        .btn-xtream { background: #9b59b6; color: #fff; }
        .btn-xtream:hover { background: #8e44ad; }
        .btn-stalker { background: #e67e22; color: #fff; }
        .btn-stalker:hover { background: #d35400; }
        .btn-quick { background: #f39c12; color: #fff; }
        .btn-quick:hover { background: #e67e22; }
        .btn-scrape { background: #e74c3c; color: #fff; }
        .btn-scrape:hover { background: #c0392b; }
        .btn-bulk { background: #00cec9; color: #000; }
        .btn-bulk:hover { background: #00b8b2; }

        .btn-discover { background: linear-gradient(135deg, #f1c40f, #e67e22); color: #000; }
        .btn-discover:hover { background: linear-gradient(135deg, #e09200, #d35400); }
        
        #xtream-panel, #link-panel, #stalker-panel, #bulk-panel {
            display: none; 
            margin-top: -10px; 
            background: rgba(30, 38, 60, 0.7); 
            border-top: none;
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            animation: fadeIn 0.3s ease;
            flex-direction: column;
            align-items: stretch;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-area { display: flex; gap: 20px; height: calc(100vh - 160px); min-height: 500px; }

        .sidebar {
            flex: none; 
            width: 350px; 
            min-width: 260px; 
            max-width: 600px; 
            resize: horizontal; 
            background: var(--bg-panel); 
            border-radius: 16px;
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .sidebar-header {
            padding: 18px; background: rgba(0, 0, 0, 0.2); font-size: 18px;
            font-weight: bold; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .badge {
            font-size: 12px; background: var(--accent); color: #000;
            padding: 4px 10px; border-radius: 12px; font-weight: bold;
        }

        .search-box {
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .batch-actions {
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .main-list-container {
            overflow-y: auto; flex: 1;
        }
        .main-list-container::-webkit-scrollbar { width: 6px; }
        .main-list-container::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

        .channel-list { list-style: none; padding: 0; margin: 0; }

        .folder-container { border-bottom: 1px solid rgba(255, 255, 255, 0.02); }
        
        .folder-header {
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.02);
            cursor: grab;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--accent);
            transition: 0.2s;
        }
        .folder-header:active { cursor: grabbing; }
        .folder-header:hover { background: rgba(255, 255, 255, 0.06); }
        .folder-header.active { background: rgba(0, 210, 255, 0.1); }
        .folder-icon { transition: transform 0.3s; }
        .folder-header.active .folder-icon { transform: rotate(90deg); }

        .folder-content { display: none; background: rgba(0, 0, 0, 0.15); min-height: 10px; }
        .folder-content.open { display: block; }

        .channel-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 15px 10px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            transition: background 0.2s; cursor: grab;
        }

        .channel-item:active { cursor: grabbing; }
        .channel-item:hover { background: var(--bg-hover); }
        .channel-item.playing { background: rgba(0, 210, 255, 0.15); border-right: 4px solid var(--accent); }

        .channel-checkbox-wrapper { display: flex; align-items: center; padding-left: 10px; }
        .ch-checkbox { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }

        .channel-info { 
            display: flex; 
            align-items: center; 
            flex: 1; 
            min-width: 0; 
            pointer-events: auto; 
        }
        
        .channel-thumb { 
            width: 40px; 
            height: 40px; 
            border-radius: 8px; 
            margin-left: 12px; 
            object-fit: cover; 
            background: #000; 
            flex-shrink: 0; 
        }
        
        .channel-name { 
            font-size: 14.5px; 
            font-weight: 600;
            color: #ffffff;
            white-space: normal;
            word-break: break-word;
            line-height: 1.4;
            display: block; 
            width: 100%;
        }

        .channel-actions { 
            display: flex; 
            gap: 5px; 
            align-items: center; 
            flex-shrink: 0; 
        }
        
        .btn-delete { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; transition: 0.3s; padding: 5px; }
        .btn-delete:hover { color: var(--danger); transform: scale(1.1); }
        
        .btn-copy { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; transition: 0.3s; padding: 5px; }
        .btn-copy:hover { color: var(--success); transform: scale(1.1); }

        .btn-edit { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; transition: 0.3s; padding: 5px; }
        .btn-edit:hover { color: var(--warning); transform: scale(1.1); }

        .video-container {
            flex: 2.5; background: var(--bg-panel); border-radius: 16px; padding: 20px;
            display: flex; flex-direction: column; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .video-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .now-playing-title { font-size: 20px; color: var(--accent); display: flex; align-items: center; gap: 8px; }
        .player-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end;}

        .btn-icon {
            background: rgba(255, 255, 255, 0.1); border: none; color: white;
            padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: 0.3s;
            font-size: 13px; font-weight: bold;
        }
        .btn-icon:hover { background: rgba(255, 255, 255, 0.2); }

        .player-wrapper {
            flex: 1; border-radius: 12px; overflow: hidden; background: #000;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .plyr { width: 100%; height: 100%; --plyr-color-main: var(--accent); }
        .plyr--video { background: #000 !important; }
        
        #external-controls {
            margin-bottom: 15px;
        }
        #external-controls .plyr__controls {
            position: static !important;
            background: rgba(0,0,0,0.3) !important;
            border: 1px solid rgba(255,255,255,0.05) !important;
            border-bottom: 2px solid var(--accent) !important;
            border-radius: 12px !important;
            padding: 10px 15px !important;
            opacity: 1 !important;
            visibility: visible !important;
            transform: none !important;
        }

        .plyr--fullscreen-active .plyr__controls {
            position: absolute !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            background: linear-gradient(transparent, rgba(0,0,0,0.8)) !important;
            border-radius: 0 !important;
            border: none !important;
        }

        @media (max-width: 992px) {
            .content-area { flex-direction: column-reverse; height: auto; }
            .sidebar { max-width: 100%; height: 400px; }
            .controls-panel { flex-direction: column; align-items: stretch; }
            .action-btns { justify-content: space-between; }
        }

        body.cinema-mode .controls-panel { display: none !important; }
        body.cinema-mode .sidebar { display: none !important; }
        body.cinema-mode .content-area { height: calc(100vh - 40px); }
        body.cinema-mode .video-container { height: 100%; }
        
        .rotated-video {
            transform: rotate(90deg);
            height: 100vw !important;
            width: 100vh !important;
            object-fit: cover;
        }

        .sortable-ghost {
            opacity: 0.4;
            background: rgba(0, 210, 255, 0.1);
            border: 2px dashed var(--accent);
        }

        /* كلاسات زراير الزووم (بديل Tailwind) */
        .fixed { position: fixed; }
        .bottom-5 { bottom: 1.25rem; }
        .right-5 { right: 1.25rem; }
        .z-50 { z-index: 50; }
        .flex-col { flex-direction: column; }
        .gap-2 { gap: 0.5rem; }
        .w-10 { width: 2.5rem; }
        .h-10 { height: 2.5rem; }
        .rounded-full { border-radius: 9999px; }
        .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .text-xl { font-size: 1.25rem; }
        .text-xs { font-size: 0.75rem; }
        .font-bold { font-weight: 700; }
        .flex { display: flex; }
        .justify-center { justify-content: center; }
        .items-center { align-items: center; }
        .text-white { color: #fff; border: none; cursor: pointer; outline: none; }
        .bg-gray-800 { background-color: #1f2937; }
        .bg-gray-500 { background-color: #6b7280; }
        .hover\:bg-gray-700:hover { background-color: #374151; }
        .hover\:bg-gray-400:hover { background-color: #9ca3af; }
        .transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .focus\:outline-none:focus { outline: 2px solid transparent; outline-offset: 2px; }
        
        @media (min-width: 768px) {
            .md\:flex { display: flex; }
        }
        @media (max-width: 767px) {
            .hidden { display: none; }
        }

    </style>

</head>

    <div class="app-wrapper" style="transform: scale(1);">
        <div class="toggle-panel-wrapper">
            <button id="toggle-panel-btn" class="btn-toggle-panel" onclick="toggleMainPanel()">⚙️ إخفاء لوحة التحكم</button>
        </div>

        <div class="controls-panel" id="main-controls-panel" style="display: flex;">
            <div class="input-group">
                <input type="text" id="i-name" placeholder="اسم القناة" data-ddg-inputtype="unknown">
                <input type="text" id="i-url" placeholder="رابط البث (m3u8/ts/xspf/mp4)" data-ddg-inputtype="unknown">
                <input type="text" id="i-logo" placeholder="رابط اللوجو (اختياري)" data-ddg-inputtype="unknown">
                <input type="text" id="i-group" placeholder="المجلد (اختياري)" data-ddg-inputtype="unknown">
                <button class="btn btn-add" onclick="addChannel()">➕ إضافة</button>
            </div>
            
            <div class="input-group" style="flex-basis: 100%; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; margin-top: 5px;">
                <input type="text" id="i-direct-link" placeholder="رابط بث (فيديو) أو موقع للتشغيل المباشر داخل المشغل..." data-ddg-inputtype="unknown">
                <button class="btn btn-add" onclick="playDirectLink()">▶️ تشغيل كفيديو</button>
                <button class="btn btn-link" onclick="playWebsite()">🌐 تشغيل كموقع</button>
                <button class="btn btn-save" onclick="saveCurrentLink()">💾 حفظ في المحفوظات</button>
            </div>
            
            <div class="action-btns" style="flex-basis: 100%;">
                <button class="btn btn-discover" onclick="discoverSports()">🏆 اكتشاف قنوات رياضية</button>
                <button class="btn btn-scrape" onclick="scrapeMatch()">🕸️ سحب الماتش</button>
                <button class="btn btn-stalker" onclick="toggleStalkerPanel()">🎮 حساب ستالكر</button>
                <button class="btn btn-link" onclick="toggleLinkPanel()">🌐 استيراد من رابط</button>
                <button class="btn btn-xtream" onclick="toggleXtreamPanel()">📡 حساب اكستريم</button>
                <button class="btn btn-bulk" onclick="toggleBulkPanel()">📝 نصوص متعددة</button>
                <input type="file" id="file-upload" accept=".m3u,.m3u8,.txt,.xspf" style="display: none;" onchange="importM3U(event)" multiple="">
                <button class="btn btn-upload" onclick="document.getElementById('file-upload').click()">📁 استيراد</button>
                <button class="btn-icon" onclick="toggleCinemaMode()" title="وضع السينما">🎦</button><button class="btn btn-export" onclick="exportHTML()">💾 تصدير HTML</button>
                <button class="btn btn-export" style="background: #9b59b6; color: white;" onclick="exportM3U()">🎵 تصدير M3U</button>
                <button class="btn-icon" id="cors-btn" onclick="toggleCors()" title="تخطي حجب السيرفرات" style="background: var(--success); color: rgb(0, 0, 0);">🛡️ بروكسي: مفعل</button><button class="btn" id="blocker-toggle-btn" style="background: var(--success); color: rgb(0, 0, 0);" onclick="toggleBlocker()">🛡️ الحماية: مفعل</button>
                <button class="btn btn-clear" onclick="clearAll()">🗑 مسح الكل</button>
            </div>
        </div>

        <div class="controls-panel" id="bulk-panel" style="display: none;">
            <div class="input-group" style="width: 100%; flex-direction: column;">
                <textarea id="bulk-input" placeholder="الصق مجموعة القنوات هنا...
الصيغ المدعومة:
1. نص M3U كامل
2. اسم القناة, رابط القناة, لوجو, اسم المجلد
3. روابط فقط (كل رابط في سطر)"></textarea>
                <button class="btn btn-add" style="align-self: flex-start; margin-top: 10px;" onclick="addBulkChannels()">➕ إضافة القنوات</button>
            </div>
        </div>

        <div class="controls-panel" id="link-panel" style="display: none;">
            <div class="input-group">
                <input type="text" id="l-url" placeholder="رابط قائمة القنوات (M3U / M3U8 / XSPF)" data-ddg-inputtype="unknown">
                <button class="btn btn-upload" id="btn-fetch-link" onclick="fetchFromLink()">📥 جلب القائمة</button>
            </div>
        </div>

        <div class="controls-panel" id="xtream-panel" style="display: none;">
            <div class="input-group" style="width: 100%; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; margin-bottom: 5px;">
                <input type="text" id="x-quick-link" placeholder="أو الصق رابط (API / M3U) هنا لاستخراج البيانات تلقائياً..." data-ddg-inputtype="unknown">
                <button class="btn btn-quick" onclick="extractAndFetchXtream()">⚡ استخراج وجلب سريع</button>
            </div>
            <div class="input-group">
                <input type="text" id="x-host" placeholder="الهوست (مثال: http://domain.com)" data-ddg-inputtype="unknown">
                <input type="text" id="x-port" placeholder="البورت (اختياري)" data-ddg-inputtype="unknown">
                <input type="text" id="x-user" placeholder="اليوزر (Username)" data-ddg-inputtype="credentials.username">
                <input type="password" id="x-pass" placeholder="الباسورد (Password)" data-ddg-inputtype="credentials.password.new">
                <button class="btn btn-add" id="btn-fetch-xtream" onclick="fetchXtream()">📥 جلب القنوات</button>
            </div>
        </div>

        <div class="controls-panel" id="stalker-panel" style="display: none;">
            <div class="input-group">
                <input type="text" id="s-url" placeholder="رابط البورتال (مثال: http://portal.com/c)" data-ddg-inputtype="unknown">
                <input type="text" id="s-mac" placeholder="الماك أدرس (مثال: 00:1A:79:xx:xx:xx)" data-ddg-inputtype="unknown">
                <button class="btn btn-add" id="btn-fetch-stalker" onclick="fetchStalker()">📥 جلب قنوات ستالكر</button>
            </div>
        </div>

        <div class="content-area">
            <div class="sidebar" style="width: 618px;">
                <div class="sidebar-header">
                    <span>القنوات الأساسية</span>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <button class="btn-icon" style="padding: 4px 8px; font-size: 12px; background: rgba(255, 165, 2, 0.2); color: var(--warning);" onclick="expandAllFolders()" title="توسيع الكل">🔽</button>
                        <button class="btn-icon" style="padding: 4px 8px; font-size: 12px; background: rgba(255, 165, 2, 0.2); color: var(--warning);" onclick="collapseAllFolders()" title="تضييق الكل">🔼</button>
                        <button class="btn-icon" style="padding: 4px 8px; font-size: 12px; background: rgba(0, 210, 255, 0.2); color: var(--accent);" onclick="createNewFolder()" title="إنشاء مجلد جديد">📁 مجلد جديد</button>
                        <span class="badge" id="ch-count">0</span>
                    </div>
                </div>
                
                <div class="search-box">
                    <input type="text" id="i-search" placeholder="🔍 إبحث عن قناة..." oninput="filterChannels()" data-ddg-inputtype="unknown">
                </div>
                
                <div class="batch-actions">
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: var(--accent); font-weight: bold; margin-left: auto; font-size: 13px;">
                        <input type="checkbox" id="select-all-cb" onchange="toggleSelectAll()" style="accent-color: var(--accent); width: 16px; height: 16px;"> تحديد الكل
                    </label>
                    <button class="btn-icon" style="background: rgba(0, 210, 255, 0.2); color: var(--accent);" onclick="checkSelectedChannels()" title="فحص القنوات المحددة">📡 فحص المحددة</button>
                    <button class="btn-icon" style="background: rgba(46, 213, 115, 0.2); color: var(--success);" onclick="copySelected()" title="نسخ الروابط">📋 نسخ</button>
                    <button class="btn-icon" style="background: rgba(255, 71, 87, 0.2); color: var(--danger);" onclick="deleteSelected()" title="حذف المحددة">🗑️ حذف</button>
                </div>

                <div class="main-list-container">
                    <ul class="channel-list" id="ch-list"></ul>
                </div>

                <div class="sidebar-header" style="background:rgba(46, 213, 115, 0.1); border-top: 2px solid rgba(255,255,255,0.05);">
                    <span>⭐ المحفوظات</span>
                    <span class="badge" id="saved-count" style="background:var(--success);">0</span>
                </div>
                <div style="max-height: 30%; overflow-y: auto;">
                    <ul class="channel-list" id="saved-list" style="background: rgba(0,0,0,0.1);"></ul>
                </div>
            </div>

            <div class="video-container">
                
                <div id="external-controls" class="plyr" style="height: auto; background: transparent; display: block;"></div>

                <div class="video-header">
                    <div class="now-playing-title" id="np-title">
                        📺 <span>لم يتم اختيار قناة</span>
                    </div>
                    <div class="player-actions">
                        <button class="btn btn-link" onclick="playWebsite()">🌐  </button><button class="btn-icon" onclick="playNext()" title="القناة التالية">⏭️</button><button class="btn-icon" onclick="playPrev()" title="القناة السابقة">⏮️</button><button class="btn btn-add" onclick="playDirectLink()">▶️  </button>
                        <button class="btn-icon" onclick="playInVLC()" title="تشغيل في VLC" style="color: #ff8c00;">🟠 VLC</button>
                        <button class="btn-icon" onclick="playInMX()" title="تشغيل في MX Player" style="color: #3498db;">🔵 MX</button>
                        <button class="btn-icon" onclick="openExternalLink()" title="فتح خارجي في تاب جديدة">↗️</button><button class="btn-icon" onclick="toggleRotation()" title="تدوير الشاشة">🔃</button>
                        <button class="btn-icon" onclick="toggleCustomFullscreen()" title="ملء الشاشة">🔲</button>
                        <button class="btn-icon" onclick="playPrev()" title="القناة السابقة">⏮️</button>
                        <button class="btn-icon" id="auto-flip-btn" onclick="toggleAutoFlip()" title="تقليب تلقائي" style="">⏱️</button>
                        <button class="btn-icon" onclick="playNext()" title="القناة التالية">⏭️</button>
                        <button class="btn-icon" onclick="toggleCinemaMode()" title="وضع السينما">🎦</button>
                        <button class="btn-icon" onclick="reloadStream()" title="تحديث البث">🔄</button>
                        <button class="btn-icon" onclick="stopStream()" title="إيقاف / إلغاء">❌</button>
                    </div>
                </div>

                <div id="stream-settings-container" style="display: none; flex-wrap: wrap; gap: 15px; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.2); padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid rgba(255, 255, 255, 0.05);">
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <span id="current-quality" style="color: var(--accent); font-weight: bold; font-size: 14px;">📡 الجودة: تلقائي</span>
                        <select id="quality-selector" onchange="changeQuality(this.value)" style="padding: 6px 12px; border-radius: 6px; background: var(--bg-panel); color: white; border: 1px solid rgba(255,255,255,0.1); outline: none; cursor: pointer;"><option value="-1">تلقائي</option><option value="0">360p</option><option value="1">480p</option><option value="2">720p</option><option value="3">1080p</option></select>
                    </div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <span style="color: var(--warning); font-weight: bold; font-size: 14px;">🎵 الصوت:</span>
                        <select id="audio-selector" onchange="changeAudio(this.value)" style="padding: 6px 12px; border-radius: 6px; background: var(--bg-panel); color: white; border: 1px solid rgba(255,255,255,0.1); outline: none; cursor: pointer;"><option value="-1">الافتراضي</option></select>
                    </div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <span style="color: var(--success); font-weight: bold; font-size: 14px;">💬 الترجمة:</span>
                        <select id="subtitle-selector" onchange="changeSubtitle(this.value)" style="padding: 6px 12px; border-radius: 6px; background: var(--bg-panel); color: white; border: 1px solid rgba(255,255,255,0.1); outline: none; cursor: pointer;"><option value="-1">إيقاف</option></select>
                    </div>
                </div>

        function playInVLC() {
            let url = document.getElementById('i-direct-link').value;
            if(url) {
                let isAndroid = /android/i.test(navigator.userAgent);
                let isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                
                if (isAndroid) {
                    let match = url.match(/^([a-zA-Z]+):\/\/(.*)$/);
                    if(match) {
                        window.location.href = `intent://${match[2]}#Intent;scheme=${match[1]};package=org.videolan.vlc;type=video/*;end`;
                    } else {
                        window.location.href = `vlc://${url}`;
                    }
                } else if (isIOS) {
                    window.location.href = `vlc://${url}`;
                } else {
                    let m3uContent = "#EXTM3U\n#EXTINF:-1,تشغيل البث\n" + url;
                    let blob = new Blob([m3uContent], { type: 'audio/x-mpegurl' });
                    let blobUrl = URL.createObjectURL(blob);
                    let a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = 'stream.m3u';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(blobUrl);
                }
            } else {
                alert("الرجاء اختيار أو إضافة رابط قناة أولاً!");
            }
        }

        function processTextContent(content, filename = '') {
            const upperContent = content.toUpperCase();
            if (upperContent.includes('#EXTINF') || upperContent.includes('#EXTM3U')) return parseM3U(content);
            if (upperContent.includes('<PLAYLIST') || filename.toLowerCase().endsWith('.xspf')) return parseXSPF(content);
            let newChs = [];
            const lines = content.split('\n');
            lines.forEach((line, index) => {
                line = line.trim();
                if (!line || line.startsWith('#')) return;
                if (line.includes(',')) {
                    const parts = line.split(',');
                    newChs.push({
                        name: parts[0].trim() || `قناة ${index + 1}`,
                        url: parts[1] ? parts[1].trim() : '',
                        logo: parts[2] ? parts[2].trim() : '',
                        group: parts[3] ? parts[3].trim() : 'مجلد مخصص'
                    });
                } else if (line.startsWith('http')) {
                    newChs.push({ name: `قناة ${index + 1}`, url: line, logo: '', group: 'قنوات مجمعة' });
                }
            });
            return newChs.filter(ch => ch.url);
        }

                mergeChannels(parsed);
                alert(`تم إضافة ${parsed.length} قناة بنجاح!`);
                document.getElementById('bulk-input').value = '';
                toggleBulkPanel();
            } else {

            }
        }

        function importM3U(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;
            
            let channelsLoaded = 0;
            let filesProcessed = 0;

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const content = e.target.result;
                    const parsedChs = processTextContent(content, file.name);
                    
                    if (parsedChs.length > 0) {
                        mergeChannels(parsedChs);
                        channelsLoaded += parsedChs.length;
                    }
                    
                    filesProcessed++;
                    if (filesProcessed === files.length) {
                        alert(`تم استيراد ${channelsLoaded} قناة بنجاح!`);
                        event.target.value = ''; 
                    }
                };
                reader.readAsText(file);
            });
        }

        function parseM3U(content) {
            const lines = content.split('\n');
            let result = [], temp = {};
            for (let line of lines) {
                line = line.trim();
                if (line.toUpperCase().startsWith('#EXTINF')) {
                    let logoMatch = line.match(/tvg-logo="([^"]+)"/i);
                    let groupMatch = line.match(/group-title="([^"]+)"/i);
                    let commaIndex = line.lastIndexOf(',');
                    temp.name = commaIndex !== -1 ? line.substring(commaIndex + 1).trim() : 'قناة';
                    temp.logo = logoMatch ? logoMatch[1] : '';
                    temp.group = groupMatch ? groupMatch[1].trim() : 'قنوات عامة';
                } else if (line && !line.startsWith('#')) {
                    temp.url = line;
                    if (!temp.name) temp.name = `قناة ${result.length + 1}`;
                    if (!temp.group) temp.group = 'قنوات عامة';
                    result.push(temp);
                    temp = {};
                }
            }
            return result;
        }

        function parseXSPF(content) {
            let result = [];
            try {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(content, "text/xml");
                const tracks = xmlDoc.getElementsByTagName("track");
                for (let i = 0; i < tracks.length; i++) {
                    const track = tracks[i];
                    const name = track.getElementsByTagName("title")[0]?.textContent || 'قناة';
                    const url = track.getElementsByTagName("location")[0]?.textContent || '';
                    if (url) result.push({ name, url, group: 'قنوات عامة' });
                }
            } catch (e) {}
            return result;
        }

        function mergeChannels(newChs) {
            const combined = newChs.concat(channels);
            const unique = [];
            const seen = new Set();
            for (const ch of combined) {
                if (!seen.has(ch.url)) {
                    seen.add(ch.url);
                    unique.push(ch);
                }
            }
            channels = unique;
            render();
        }

        function render() {
            const openFolders = new Set();
            document.querySelectorAll('.folder-content.open').forEach(ul => {
                const folderName = ul.parentElement.getAttribute('data-folder');
                if(folderName) openFolders.add(folderName);
            });

            channels.forEach(ch => {
                const g = ch.group || 'عامة';
                if (!customFolders.includes(g)) customFolders.push(g);
            });
            domList.innerHTML = '';
            domCount.innerText = channels.length;
            
            const groups = {};
            customFolders.forEach(f => groups[f] = []);
            channels.forEach((ch, idx) => {
                const g = ch.group || 'عامة';
                groups[g].push({ ...ch, originalIndex: idx });
            });

            if (Object.keys(groups).length === 0) {
                domList.innerHTML = '<li style="padding: 20px; text-align:center;">القائمة فارغة</li>';
                return;

            });

        async function fetchFromLink() {
            const urlInput = document.getElementById('l-url').value.trim();

            try {
                let testUrl = urlInput.startsWith('http') ? urlInput : 'http://' + urlInput;
                const response = await fetch(testUrl);
                const content = await response.text();
                let newChs = (content.includes('<playlist') || urlInput.endsWith('.xspf')) ? parseXSPF(content) : parseM3U(content);
                if (newChs.length > 0) {
                    mergeChannels(newChs);
                    alert(`تم استيراد ${newChs.length} قناة بالفولدرات!`);
                    toggleLinkPanel();
                    document.getElementById('l-url').value = '';
                    return;
                }
            } catch (e) {}

            try {
                let response = await fetch(urlInput).catch(async () => await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(urlInput)));
                if (!response || !response.ok) throw new Error('مشكلة في الاتصال');
                const content = await response.text();
                let newChs = (content.includes('<playlist') || urlInput.endsWith('.xspf')) ? parseXSPF(content) : parseM3U(content);
                
                if (newChs.length === 0) {
                    if(urlInput.startsWith('http')) {

                        alert("تم إضافة القناة!");
                        toggleLinkPanel();
                        document.getElementById('l-url').value = '';
                    } else alert("الرابط مش شغال!");
                } else {
                    mergeChannels(newChs);
                    alert(`تم استيراد ${newChs.length} قناة بالفولدرات!`);
                    toggleLinkPanel();
                    document.getElementById('l-url').value = '';

                const pass = urlObj.searchParams.get('password');

                    document.getElementById('x-host').value = urlObj.protocol + '//' + urlObj.hostname;
                    document.getElementById('x-port').value = urlObj.port || '';
                    document.getElementById('x-user').value = user;

        async function fetchXtream() {
            const host = document.getElementById('x-host').value.trim();
            const port = document.getElementById('x-port').value.trim();
            const user = document.getElementById('x-user').value.trim();
            const pass = document.getElementById('x-pass').value.trim();
            const btn = document.getElementById('btn-fetch-xtream');

            if (!host || !user || !pass) return alert("اكمل البيانات!");
            let baseUrl = host.endsWith('/') ? host.slice(0, -1) : host;
            if (port) baseUrl += ':' + port;

            btn.innerText = "⏳ التحميل...";
            btn.disabled = true;

            try {
                const catApi = `${baseUrl}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}&action=get_live_categories`;
                let resCat = await fetch(catApi).catch(async () => await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(catApi)));
                const catData = await resCat.json();
                const catMap = {};
                if (Array.isArray(catData)) catData.forEach(c => catMap[c.category_id] = c.category_name);

                const streamApi = `${baseUrl}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}&action=get_live_streams`;
                let res = await fetch(streamApi).catch(async () => await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(streamApi)));
                const data = await res.json();
                
                if (!data || data.length === 0) alert("مفيش قنوات!");
                else {
                    const newChannels = data.map(stream => ({
                        name: stream.name || 'قناة',
                        url: `${baseUrl}/live/${encodeURIComponent(user)}/${encodeURIComponent(pass)}/${stream.stream_id}.m3u8`,
                        logo: stream.stream_icon || '',
                        group: catMap[stream.category_id] || 'قنوات اكستريم'
                    }));
                    mergeChannels(newChannels);
                    alert(`عاش! تم جلب ${newChannels.length} قناة متقسمين في فولدرات.`);
                    toggleXtreamPanel();
                }
            } catch (error) {
                alert("مشكلة في الاتصال! السيرفر مانع الاتصال حتى مع البروكسي.");
            } finally {
                btn.innerText = "📥 جلب القنوات";
                btn.disabled = false;
            }
        }

        async function fetchStalker() {
            const portal = document.getElementById('s-url').value.trim();
            const mac = document.getElementById('s-mac').value.trim();
            const btn = document.getElementById('btn-fetch-stalker');
            if (!portal || !mac) return alert("اكمل البيانات!");
            
            let baseUrl = portal;
            if (baseUrl.endsWith('/c')) baseUrl = baseUrl.slice(0, -2);
            if (baseUrl.endsWith('/')) baseUrl = baseUrl.slice(0, -1);
            if (!baseUrl.endsWith('/server/load.php')) baseUrl += '/server/load.php';
            
            btn.innerText = "⏳ التحميل...";
            btn.disabled = true;
            try {
                const targetUrl = `${baseUrl}?type=itv&action=get_all_channels`;
                let response = await fetch(targetUrl, { headers: { 'mac': mac } }).catch(async () => await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl), { headers: { 'mac': mac } }));
                const data = await response.json();
                
                if (data && data.js && data.js.data) {
                    const stalkerChannels = data.js.data.map(ch => {
                        let streamUrl = ch.cmd ? ch.cmd.split(' ').pop() : '';
                        if(!streamUrl.startsWith('http')) streamUrl = `${baseUrl}?type=itv&action=create_link&cmd=${encodeURIComponent(ch.cmd)}&mac=${mac}`;
                        return { name: ch.name || 'قناة', url: streamUrl, logo: ch.logo || '', group: 'قنوات ستالكر' };
                    }).filter(ch => ch.url !== '');
                    mergeChannels(stalkerChannels);
                    alert(`تم جلب ${stalkerChannels.length} قناة!`);
                    toggleStalkerPanel();
                } else alert("البيانات فارغة! تأكد من البورتال والماك.");
            } catch(error) {
                alert("مشكلة في الاتصال أو السيرفر مانع الـ CORS.");
            } finally {
                btn.innerText = "📥 جلب قنوات ستالكر";
                btn.disabled = false;
            }
        }

            if (savedItems.length > 0) {

        function updateStreamSettings() {
            const c = document.getElementById('stream-settings-container');
            const qTxt = document.getElementById('current-quality');
            const qSel = document.getElementById('quality-selector');
            const aSel = document.getElementById('audio-selector');
            const sSel = document.getElementById('subtitle-selector');
            
            if(!hlsInstance) { c.style.display = 'none'; return; }
            let hasOptions = false;
            const levels = hlsInstance.levels;
            qSel.innerHTML = '<option value="-1">تلقائي</option>';
            if (levels && levels.length > 0) {
                hasOptions = true;
                levels.forEach((l, i) => {
                    if(l.height){
                        const o = document.createElement('option');
                        o.value = i;
                        o.text = l.height+'p';
                        qSel.appendChild(o);
                    }
                });
                qSel.value = hlsInstance.currentLevel;
            }

            const audioTracks = hlsInstance.audioTracks;
            aSel.innerHTML = '';
            if (audioTracks && audioTracks.length > 1) {
                hasOptions = true;
                audioTracks.forEach((t, i) => {
                    const o = document.createElement('option');
                    o.value = i; o.text = t.name || t.language || `صوت ${i+1}`;
                    aSel.appendChild(o);
                });
                aSel.value = hlsInstance.audioTrack;
            } else {
                aSel.innerHTML = '<option value="-1">الافتراضي</option>';
            }

            const subTracks = hlsInstance.subtitleTracks;
            sSel.innerHTML = '<option value="-1">إيقاف</option>';
            if (subTracks && subTracks.length > 0) {
                hasOptions = true;
                subTracks.forEach((t, i) => {
                    const o = document.createElement('option');
                    o.value = i; o.text = t.name || t.language || `ترجمة ${i+1}`;
                    sSel.appendChild(o);
                });
                sSel.value = hlsInstance.subtitleTrack;
            }
            c.style.display = hasOptions ? 'flex' : 'none';
        }

        async function play(url, name, el, idx) {
            currentUrl = url;
            currentName = name;
            currentChannelIndex = idx;
            document.getElementById('i-direct-link').value = url;
            
            const ifr = document.getElementById('website-player');
            const vid = document.getElementById('video-player');
            
            let isWebsite = false;
            if (channels[idx] && channels[idx].playbackMode === 'website') {
                isWebsite = true;
            }

            if(isWebsite) {
                if (hlsInstance) hlsInstance.destroy();
                vid.pause(); vid.removeAttribute('src'); vid.load();
                document.querySelector('.player-wrapper .plyr').style.setProperty('display', 'none', 'important');
                document.getElementById('external-controls').style.display = 'none';
                ifr.style.display = 'block';
                ifr.src = url;
                domTitle.innerText = name;
                document.getElementById('stream-settings-container').style.display = 'none';
                document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('playing'));
                if (el) el.parentElement.classList.add('playing');
                return;
            }

            ifr.src = ''; ifr.style.display = 'none';
            document.querySelector('.player-wrapper .plyr').style.setProperty('display', 'block', 'important');
            document.getElementById('external-controls').style.display = 'block';
            
            domTitle.innerText = "⏳ جاري الاتصال...";
            document.getElementById('stream-settings-container').style.display = 'none';
            document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('playing'));
            if (el) el.parentElement.classList.add('playing');

            if (hlsInstance) hlsInstance.destroy();
            let streamUrl = url;
            
            if (streamUrl.includes('action=create_link')) {
                try {
                    let res;
                    try { res = await fetch(streamUrl); } catch(e) { res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(streamUrl)); }
                    const data = await res.json();
                    if (data && data.js && data.js.cmd) streamUrl = data.js.cmd.split(' ').pop();
                    else throw new Error("لا يمكن توليد الرابط");
                } catch(e) {
                    domTitle.innerText = "❌ فشل رابط ستالكر";
                    return;
                }
            }

            if (Hls.isSupported()) {
                hlsInstance = new Hls({ maxBufferLength: 30, maxMaxBufferLength: 600 });
                hlsInstance.loadSource(streamUrl);
                hlsInstance.attachMedia(vid);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function () {
                    plyrInstance.play().catch(()=>{});
                    updateStreamSettings();
                });
                hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hlsInstance.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hlsInstance.recoverMediaError();
                                break;
                            default:
                                hlsInstance.destroy();
                                domTitle.innerText = "❌ البث متوقف أو الرابط غير مدعوم"; 
                                document.getElementById('stream-settings-container').style.display = 'none';
                                break;
                        }
                    }
                });
            } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
                vid.src = streamUrl; 
                plyrInstance.play().catch(()=>{});
            } else { 
                vid.src = streamUrl; 
                plyrInstance.play().catch(()=>{}); 
            }
            domTitle.innerText = name;
        }

        function stopStream(isInternal = false) { 
            if (hlsInstance) hlsInstance.destroy(); 
            const v = document.getElementById('video-player'); v.pause(); v.removeAttribute('src'); v.load(); 
            
            const ifr = document.getElementById('website-player'); 
            ifr.src = ''; ifr.style.display = 'none';
            
            document.querySelector('.player-wrapper .plyr').style.setProperty('display', 'block', 'important'); 
            document.getElementById('external-controls').style.display = 'block';

            domTitle.innerText = "لم يتم اختيار قناة"; 
            document.getElementById('stream-settings-container').style.display = 'none'; 
            
            if (!isInternal && isAutoFlipActive) {
                clearInterval(autoFlipInterval);
                isAutoFlipActive = false;
                const btn = document.getElementById('auto-flip-btn');
                if (btn) { btn.style.background = ''; btn.style.color = ''; }
            }
        }

        if (injected && injected.length > 0) {
            mergeChannels(injected);
        } else {
            render(); 
        }
        renderSaved();
    let isCorsEnabled = false;

function toggleCors() {
    isCorsEnabled = !isCorsEnabled;
    const btn = document.getElementById('cors-btn');
    if (isCorsEnabled) {
        btn.innerHTML = '🛡️ بروكسي: مفعل';
        btn.style.background = 'var(--success)';
        btn.style.color = '#000';
    } else {
        btn.innerHTML = '🛡️ بروكسي: معطل';
        btn.style.background = 'rgba(255, 255, 255, 0.1)';
        btn.style.color = '#fff';
    }
}
// الكود اللي هيضاف داخل دالة play() قبل تشغيل الفيديو
let finalUrl = url;
if (isCorsEnabled && !isWebsite) {
    // استخدمنا بروكسي مجاني كمثال
    finalUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
}

// كمل كودك العادي بس استخدم finalUrl بدل url
if (Hls.isSupported() && finalUrl.includes('.m3u8')) {
    hlsInstance = new Hls();
    hlsInstance.loadSource(finalUrl); // هنا التعديل
    // ... باقي الكود
} else {
    video.src = finalUrl; // هنا التعديل
    // ... باقي الكود
}    
    </script>
